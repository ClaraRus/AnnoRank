
{% block body %}


<div id="doc_obj">
    <div id="expandable-row-{{doc_index}}">
        <td colspan="4">
            <div class="mt-4 p-4 bg-gray-100 border border-gray-300 text-sm text-black">
                <p class="mb-2">
                    Your application for the position of [job title] was not selected for the interview. To be considered for the interview,...
                </p>
            </div>

            <div class="mt-4 p-4 bg-gray-100 border border-gray-300 text-sm text-black">
                <div class="flex justify-between items-center">    
                    <p class="mb-2">
                        [add CF explanatory statement 1 (e.g. "you should posses skill a")]
                    </p>
                    <button
                        class="view-button hover:text-blue-600"
                        onclick="loadAndToggleVisibility('expandable-row-{{doc_index}}-cf', '{{doc_id}}-cf', '/static/CF_explanation.html', 'cf')"
                        >
                        More Details
                    </button>
                </div>
            </div>

            <!-- Hidden div for second-level CF content -->
            <div id="expandable-row-{{doc_index}}-cf" style="display: none;" class="mt-4">
                <p>Updated</p>
            </div>
        <td>
    </div> 
</div> 

{% endblock %}
