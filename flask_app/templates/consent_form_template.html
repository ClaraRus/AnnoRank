<div class="mt-4">
    <div class="-mx-1">

                    <div class="mt-4">

                                               viewBox="0 0 10 6">
                                            <path stroke="currentColor"
                                                  stroke-linecap="round"
                                                  stroke-linejoin="round"
                                                  stroke-width="2"
                                                  d="M9 5 5 1 1 5"/>
                                          </svg>
                                        </button>
                                        </h2>
                                        <div id="accordion-collapse-body-1" class="hidden" aria-labelledby="accordion-collapse-heading-1">
											<div class="p-5 border border-b-0 border-gray-200 dark:border-gray-700 dark:bg-gray-900">
												<p><strong>Information provided</strong></p>

												<p>Therefore, we provide you with the following information:</p><br>
												<p><strong>1. Example:</strong> ... </p>

											</div>
										</div>
                                    </div>


                                    <div class="flex flex-col m-5" name="consent-container">
										<div class="flex flex-row m-5 gap-x-1">
											<p>Download the information sheet: <a href="" target="_blank" class="text-blue-600 hover:underline">Click here</a></p>
										</div>
										<div class="flex flex-row m-5 gap-x-1">
											<p>I declare</p>
										</div>
										<div class="flex flex-row m-5 gap-x-1">
											<input type="checkbox" id="declare_read_info" name="declare_consent" class="flex-none m-1 w-5 h-5">
											<label class="place-content-center align-middle">
												that I have read the information provided.</label>
										</div>

									</div>
                <!---  <div class="text-gray-500 py-3 ">In the job description below, the mandatory skills are displayed in bold. </div>
                                </div> -->

                                </div>
                            </div>
            <form method="post">
                <div class="py-3 text-center">
                    <button id="done_button" type="submit" disabled>Next</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function toggleAccordion() {
  const content = document.getElementById('accordion-collapse-body-1');
  const icon = document.getElementById('accordion-icon');
  const button = document.getElementById('accordion-button');

  const isHidden = content.classList.contains('hidden');
  if (isHidden) {
    content.classList.remove('hidden');
    icon.classList.add('rotate-180');
    button.setAttribute('aria-expanded', 'true');
  } else {
    content.classList.add('hidden');
    icon.classList.remove('rotate-180');
    button.setAttribute('aria-expanded', 'false');
  }
}
</script>

<script>
const link = window.location.href;
const parts = link.split('/');
const experimentId = parts[4];

const consentCheckboxes = document.querySelectorAll(
    'input[type="checkbox"][name="declare_consent"], ' +
    'input[type="checkbox"][name="final_consent"]'
);

const submitButton = document.getElementById('done_button');

function updateSubmitButtonState() {
    const allConsentChecked = [...consentCheckboxes].every(checkbox => checkbox.checked);
    submitButton.disabled = !allConsentChecked;
    submitButton.style.backgroundColor = allConsentChecked ? 'green' : '#A9A9A9';
}

consentCheckboxes.forEach(checkbox => {
    checkbox.addEventListener('change', updateSubmitButtonState);
});

updateSubmitButtonState();
</script>
